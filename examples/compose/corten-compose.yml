# Example: Web app with API and database
# Usage: cd examples/compose && sudo corten compose up -d

services:
  api:
    image: alpine
    command: ["sh", "-c", "echo 'API starting' && sleep 3600"]
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - DB_HOST=db
    depends_on:
      - db
    restart: always

  db:
    image: alpine
    command: ["sh", "-c", "echo 'DB starting' && sleep 3600"]
    environment:
      - DB_NAME=myapp
    volumes:
      - /tmp/corten-db:/data
    restart: always

  worker:
    image: alpine
    command: ["sh", "-c", "echo 'Worker starting' && sleep 3600"]
    environment:
      - WORKER_MODE=background
    depends_on:
      - api
      - db
